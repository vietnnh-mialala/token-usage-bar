name: Release

# Tag a commit `vX.Y.Z` (matching VERSION in token_bar.py) and push the tag:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds the exe, packages the zip, and publishes a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pyinstaller pystray pillow

      - name: Build exe
        run: |
          python generate_icon.py
          python generate_version.py
          python -m PyInstaller --onefile --noconsole --name TokenUsageBar `
            --icon icon.ico --version-file version_info.txt --clean --noconfirm token_bar.py

      - name: Package zip + checksum
        shell: pwsh
        run: |
          $rel = "release/TokenUsageBar"
          New-Item -ItemType Directory -Force -Path $rel | Out-Null
          # Keep this list in sync with build.ps1. The .cmd launchers are REQUIRED —
          # double-clicking them is the only install path that survives the default
          # RemoteSigned policy (right-clicking a downloaded .ps1 is blocked).
          $payload = 'dist/TokenUsageBar.exe','Install.cmd','Uninstall.cmd',
                     'install.ps1','uninstall.ps1','QUICKSTART.txt','README.md','LICENSE'
          Copy-Item $payload $rel
          Compress-Archive -Path "$rel/*" -DestinationPath "TokenUsageBar.zip" -Force
          # Guard: fail the release if any required file didn't make it into the zip.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $names = [System.IO.Compression.ZipFile]::OpenRead("$PWD/TokenUsageBar.zip").Entries.FullName
          foreach ($req in 'Install.cmd','Uninstall.cmd','install.ps1','uninstall.ps1','TokenUsageBar.exe','QUICKSTART.txt','README.md','LICENSE') {
            if ($names -notcontains $req) { throw "Packaging error: '$req' missing from TokenUsageBar.zip" }
          }
          Write-Host "Zip OK - contains: $($names -join ', ')"
          $h = (Get-FileHash dist/TokenUsageBar.exe -Algorithm SHA256).Hash
          "$h  TokenUsageBar.exe" | Out-File -Encoding ascii TokenUsageBar.exe.sha256
          Write-Host "SHA256 (put this in the winget installer manifest): $h"

      # Optional: scan the exe on VirusTotal before publishing.
      # Add repo secret VT_API_KEY, then uncomment:
      # - name: VirusTotal scan
      #   uses: crazy-max/ghaction-virustotal@v4
      #   with:
      #     vt_api_key: ${{ secrets.VT_API_KEY }}
      #     files: dist/TokenUsageBar.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TokenUsageBar.exe
            TokenUsageBar.zip
            TokenUsageBar.exe.sha256
          generate_release_notes: true
