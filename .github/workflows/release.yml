name: Release

# Tag a commit `vX.Y.Z` (matching VERSION in token_bar.py) and push the tag:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds the exe, packages the zip, and publishes a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pyinstaller pystray pillow

      - name: Build exe
        run: |
          python generate_icon.py
          python generate_version.py
          python -m PyInstaller --onefile --noconsole --name TokenUsageBar `
            --icon icon.ico --version-file version_info.txt --clean --noconfirm token_bar.py

      - name: Package zip + checksum
        shell: pwsh
        run: |
          $rel = "release/TokenUsageBar"
          New-Item -ItemType Directory -Force -Path $rel | Out-Null
          Copy-Item dist/TokenUsageBar.exe,install.ps1,uninstall.ps1,README.md,LICENSE $rel
          Compress-Archive -Path "$rel/*" -DestinationPath "TokenUsageBar.zip" -Force
          $h = (Get-FileHash dist/TokenUsageBar.exe -Algorithm SHA256).Hash
          "$h  TokenUsageBar.exe" | Out-File -Encoding ascii TokenUsageBar.exe.sha256
          Write-Host "SHA256 (put this in the winget installer manifest): $h"

      # Optional: scan the exe on VirusTotal before publishing.
      # Add repo secret VT_API_KEY, then uncomment:
      # - name: VirusTotal scan
      #   uses: crazy-max/ghaction-virustotal@v4
      #   with:
      #     vt_api_key: ${{ secrets.VT_API_KEY }}
      #     files: dist/TokenUsageBar.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TokenUsageBar.exe
            TokenUsageBar.zip
            TokenUsageBar.exe.sha256
          generate_release_notes: true
